<article [class] ="{
    'status-open':task().status ==='OPEN',
    'status-in-progress':task().status ==='IN_PROGRESS',
    'status-done':task().status ==='DONE',
}">
<header>
    <h3>{{task().title}}</h3>
    <p>{{taskStatus()}}</p>
</header>
<p>{{task().description}}</p>
<form (ngSubmit)="onChangeTaskStatus(task().id,status.value)">
        <select #status>
            <option *ngFor="let option of taskStatusOption"
            [value]="option.value"
            [selected]="task().status.toLowerCase()===option.value">
        {{option.text}}
        </option>
        </select>
        <button>Change Status</button>
</form>
</article>
